<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Comfort Counsel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <div class="nav-logo">🌿 Comfort Counsel</div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="find-counselor.html">Find Counselor</a>
    <a href="register-counselor.html">Become a Counselor</a>
  </div>
</nav>

<div class="form-page">
  <div id="login-card" class="form-card">
    <h2>Welcome Back</h2>
    <p class="form-sub">Login to your Comfort Counsel account</p>
    <div id="login-alert"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
    </form>
    <div class="form-footer">
      New user? <a href="#" id="show-register">Create an account</a> &nbsp;|&nbsp;
      <a href="register-counselor.html">Become a counselor</a>
    </div>
  </div>

  <!-- Register card (toggle) -->
  <div id="register-card" class="form-card" style="display:none;">
    <h2>Create Account</h2>
    <p class="form-sub">Sign up to book counseling sessions</p>
    <div id="register-alert"></div>
    <form id="register-form">
      <div class="form-group">
        <label for="reg-name">Full Name</label>
        <input type="text" id="reg-name" placeholder="Your full name" required />
      </div>
      <div class="form-group">
        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
    </form>
    <div class="form-footer">
      Already have an account? <a href="#" id="show-login">Login here</a>
    </div>
  </div>
</div>

<script>
  document.getElementById('show-register').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('login-card').style.display = 'none';
    document.getElementById('register-card').style.display = 'block';
  });
  document.getElementById('show-login').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('register-card').style.display = 'none';
    document.getElementById('login-card').style.display = 'block';
  });

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true; btn.textContent = 'Logging in...';
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      localStorage.setItem('cc_token', data.token);
      localStorage.setItem('cc_user', JSON.stringify(data.user));
      window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
    } catch (err) {
      document.getElementById('login-alert').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      btn.disabled = false; btn.textContent = 'Login';
    }
  });

  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true; btn.textContent = 'Creating account...';
    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: document.getElementById('reg-name').value,
          email: document.getElementById('reg-email').value,
          password: document.getElementById('reg-password').value
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      localStorage.setItem('cc_token', data.token);
      localStorage.setItem('cc_user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } catch (err) {
      document.getElementById('register-alert').innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
