<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Comfort Counsel</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      padding: 2rem 1rem;
    }
    
    .auth-container {
      background: white;
      border-radius: 1.5rem;
      padding: 3rem;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-xl);
    }
    
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .auth-logo-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    
    .auth-logo-text {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }
    
    .form-group {
      margin-bottom: 1.25rem;
    }
    
    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      font-size: 0.9375rem;
    }
    
    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      transition: var(--transition);
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    
    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .remember-me input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
    }
    
    .remember-me label {
      cursor: pointer;
      color: var(--text-secondary);
    }
    
    .forgot-link {
      color: var(--primary);
      font-weight: 600;
      transition: var(--transition);
    }
    
    .forgot-link:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }
    
    .alert {
      padding: 0.875rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1.25rem;
      font-size: 0.9375rem;
      display: none;
    }
    
    .alert-error {
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FECACA;
    }
    
    .alert-success {
      background: #D1FAE5;
      color: #065F46;
      border: 1px solid #A7F3D0;
    }
    
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    
    .divider span {
      padding: 0 1rem;
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-secondary);
      font-size: 0.9375rem;
    }
    
    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
      transition: var(--transition);
    }
    
    .auth-footer a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }
    
    .role-selector {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    
    .role-option {
      flex: 1;
      padding: 1rem;
      border: 2px solid var(--border);
      border-radius: 0.75rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .role-option:hover {
      border-color: var(--primary);
      background: var(--bg-secondary);
    }
    
    .role-option.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }
    
    .role-option input {
      display: none;
    }
    
    .role-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    
    .role-name {
      font-weight: 600;
      font-size: 0.9375rem;
    }
    
    @media (max-width: 480px) {
      .auth-container {
        padding: 2rem 1.5rem;
      }
      
      .auth-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-container">
    
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🌿</div>
      <div class="auth-logo-text">Comfort Counsel</div>
    </div>
    
    <!-- Header -->
    <div class="auth-header">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to continue to your account</p>
    </div>
    
    <!-- Alert -->
    <div class="alert alert-error" id="error-alert">
      <span id="error-message"></span>
    </div>
    
    <div class="alert alert-success" id="success-alert">
      <span id="success-message"></span>
    </div>
    
    <!-- Login Form -->
    <form id="login-form">
      
      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input 
          type="email" 
          class="form-input" 
          id="email"
          placeholder="your@email.com"
          required
          autocomplete="email"
        />
      </div>
      
      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position: relative;">
          <input 
            type="password" 
            class="form-input" 
            id="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
            style="padding-right: 3rem;"
          />
          <button 
            type="button" 
            id="toggle-password"
            style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-muted); padding: 0.5rem;"
            title="Show/hide password"
          >
            👁️
          </button>
        </div>
      </div>
      
      <!-- Options -->
      <div class="form-options">
        <div class="remember-me">
          <input type="checkbox" id="remember" />
          <label for="remember">Remember me</label>
        </div>
        <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
      </div>
      
      <!-- Submit -->
      <button type="submit" class="btn btn-primary btn-lg btn-block">
        Sign In
      </button>
      
    </form>
    
    <!-- Divider -->
    <div class="divider">
      <span>or</span>
    </div>
    
    <!-- Quick Links -->
    <div style="display: flex; gap: 0.75rem;">
      <a href="register.html" class="btn btn-outline" style="flex: 1;">
        Sign Up as Client
      </a>
      <a href="register-counselor.html" class="btn btn-outline" style="flex: 1;">
        Join as Counselor
      </a>
    </div>
    
    <!-- Footer -->
    <div class="auth-footer">
      Don't have an account? 
      <a href="register.html">Sign up</a>
    </div>
    
    <div class="auth-footer" style="margin-top: 1rem;">
      <a href="index.html">← Back to Home</a>
    </div>
    
  </div>
</div>

<script>
// Check for success message from registration
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('registered') === 'true') {
  const successAlert = document.getElementById('success-alert');
  const successMessage = document.getElementById('success-message');
  successMessage.textContent = 'Registration successful! Please sign in.';
  successAlert.style.display = 'block';
}

// Password visibility toggle
document.getElementById('toggle-password').addEventListener('click', function() {
  const passwordInput = document.getElementById('password');
  const type = passwordInput.type === 'password' ? 'text' : 'password';
  passwordInput.type = type;
  this.textContent = type === 'password' ? '👁️' : '🙈';
});

// Login Form Handler
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const errorAlert = document.getElementById('error-alert');
  const errorMessage = document.getElementById('error-message');
  const successAlert = document.getElementById('success-alert');
  
  // Hide alerts
  errorAlert.style.display = 'none';
  successAlert.style.display = 'none';
  
  // Get form data
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('remember').checked;
  
  // Validation
  if (!email || !password) {
    errorMessage.textContent = 'Please enter both email and password';
    errorAlert.style.display = 'block';
    return;
  }
  
  // Disable submit button
  const submitBtn = e.target.querySelector('button[type="submit"]');
  const originalText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in...';
  
  try {
    // Call login API
    const response = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    
    const data = await response.json();
    
    if (!response.ok) {
      throw new Error(data.error || data.message || 'Login failed');
    }
    
    // Store token and user data
    localStorage.setItem('cc_token', data.token);
    localStorage.setItem('cc_user', JSON.stringify(data.user));
    
    // Redirect based on role
    if (data.user.role === 'admin') {
      window.location.href = 'admin.html';
    } else if (data.user.role === 'counselor') {
      window.location.href = 'counselor-dashboard.html';
    } else {
      window.location.href = 'index.html';
    }
    
  } catch (error) {
    console.error('Login error:', error);
    errorMessage.textContent = error.message || 'Invalid email or password';
    errorAlert.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = originalText;
  }
});
</script>

</body>
</html>
