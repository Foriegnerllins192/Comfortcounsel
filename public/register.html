<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Comfort Counsel</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      padding: 2rem 1rem;
    }
    
    .auth-container {
      background: white;
      border-radius: 1.5rem;
      padding: 3rem;
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow-xl);
    }
    
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .auth-logo-icon {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    
    .auth-logo-text {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--primary);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .auth-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }
    
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }
    
    .form-group {
      margin-bottom: 1.25rem;
    }
    
    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      font-size: 0.9375rem;
    }
    
    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      transition: var(--transition);
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    
    .password-strength {
      margin-top: 0.5rem;
      font-size: 0.875rem;
    }
    
    .strength-bar {
      height: 4px;
      background: var(--gray-200);
      border-radius: 2px;
      margin-top: 0.375rem;
      overflow: hidden;
    }
    
    .strength-fill {
      height: 100%;
      width: 0%;
      transition: all 0.3s ease;
      border-radius: 2px;
    }
    
    .strength-weak { width: 33%; background: var(--danger); }
    .strength-medium { width: 66%; background: var(--warning); }
    .strength-strong { width: 100%; background: var(--success); }
    
    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    
    .checkbox-group input {
      width: 20px;
      height: 20px;
      margin-top: 0.125rem;
      accent-color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }
    
    .checkbox-group label {
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.9375rem;
      line-height: 1.5;
    }
    
    .checkbox-group label a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: underline;
    }
    
    .alert {
      padding: 0.875rem 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1.25rem;
      font-size: 0.9375rem;
      display: none;
    }
    
    .alert-error {
      background: #FEE2E2;
      color: #991B1B;
      border: 1px solid #FECACA;
    }
    
    .alert-success {
      background: #D1FAE5;
      color: #065F46;
      border: 1px solid #A7F3D0;
    }
    
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    
    .divider span {
      padding: 0 1rem;
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-secondary);
      font-size: 0.9375rem;
    }
    
    .auth-footer a {
      color: var(--primary);
      font-weight: 600;
      transition: var(--transition);
    }
    
    .auth-footer a:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }
    
    @media (max-width: 480px) {
      .auth-container {
        padding: 2rem 1.5rem;
      }
      
      .auth-title {
        font-size: 1.5rem;
      }
      
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="auth-page">
  <div class="auth-container">
    
    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">🌿</div>
      <div class="auth-logo-text">Comfort Counsel</div>
    </div>
    
    <!-- Header -->
    <div class="auth-header">
      <h1 class="auth-title">Create Your Account</h1>
      <p class="auth-subtitle">Join thousands finding support and guidance</p>
    </div>
    
    <!-- Alert -->
    <div class="alert alert-error" id="error-alert">
      <span id="error-message"></span>
    </div>
    
    <div class="alert alert-success" id="success-alert">
      <span id="success-message"></span>
    </div>
    
    <!-- Registration Form -->
    <form id="register-form">
      
      <!-- Name Fields -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input 
            type="text" 
            class="form-input" 
            id="first-name"
            placeholder="John"
            required
            autocomplete="given-name"
          />
        </div>
        
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input 
            type="text" 
            class="form-input" 
            id="last-name"
            placeholder="Doe"
            required
            autocomplete="family-name"
          />
        </div>
      </div>
      
      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input 
          type="email" 
          class="form-input" 
          id="email"
          placeholder="your@email.com"
          required
          autocomplete="email"
        />
      </div>
      
      <!-- Phone -->
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input 
          type="tel" 
          class="form-input" 
          id="phone"
          placeholder="0201234567"
          required
          autocomplete="tel"
        />
      </div>
      
      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position: relative;">
          <input 
            type="password" 
            class="form-input" 
            id="password"
            placeholder="Create a strong password"
            required
            autocomplete="new-password"
            style="padding-right: 3rem;"
          />
          <button 
            type="button" 
            id="toggle-password"
            style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-muted); padding: 0.5rem;"
            title="Show/hide password"
          >
            👁️
          </button>
        </div>
        <div class="password-strength">
          <div class="strength-bar">
            <div class="strength-fill" id="strength-fill"></div>
          </div>
          <span id="strength-text" style="color: var(--text-muted); font-size: 0.875rem;"></span>
        </div>
      </div>
      
      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div style="position: relative;">
          <input 
            type="password" 
            class="form-input" 
            id="confirm-password"
            placeholder="Re-enter your password"
            required
            autocomplete="new-password"
            style="padding-right: 3rem;"
          />
          <button 
            type="button" 
            id="toggle-confirm-password"
            style="position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem; color: var(--text-muted); padding: 0.5rem;"
            title="Show/hide password"
          >
            👁️
          </button>
        </div>
      </div>
      
      <!-- Terms Acceptance -->
      <div class="checkbox-group">
        <input type="checkbox" id="terms" required />
        <label for="terms">
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
        </label>
      </div>
      
      <!-- Submit -->
      <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
        Create Account
      </button>
      
    </form>
    
    <!-- Divider -->
    <div class="divider">
      <span>or</span>
    </div>
    
    <!-- Counselor Link -->
    <a href="register-counselor.html" class="btn btn-outline" style="width: 100%; display: block; text-align: center;">
      Register as a Counselor
    </a>
    
    <!-- Footer -->
    <div class="auth-footer">
      Already have an account? 
      <a href="login.html">Sign in</a>
    </div>
    
    <div class="auth-footer" style="margin-top: 1rem;">
      <a href="index.html">← Back to Home</a>
    </div>
    
  </div>
</div>

<script>
// Password Strength Checker
const passwordInput = document.getElementById('password');
const strengthFill = document.getElementById('strength-fill');
const strengthText = document.getElementById('strength-text');

passwordInput.addEventListener('input', (e) => {
  const password = e.target.value;
  const strength = calculatePasswordStrength(password);
  
  strengthFill.className = 'strength-fill';
  
  if (strength === 0) {
    strengthFill.style.width = '0%';
    strengthText.textContent = '';
  } else if (strength < 3) {
    strengthFill.classList.add('strength-weak');
    strengthText.textContent = 'Weak password';
    strengthText.style.color = 'var(--danger)';
  } else if (strength < 4) {
    strengthFill.classList.add('strength-medium');
    strengthText.textContent = 'Medium strength';
    strengthText.style.color = 'var(--warning)';
  } else {
    strengthFill.classList.add('strength-strong');
    strengthText.textContent = 'Strong password';
    strengthText.style.color = 'var(--success)';
  }
});

// Password visibility toggle
document.getElementById('toggle-password').addEventListener('click', function() {
  const passwordInput = document.getElementById('password');
  const type = passwordInput.type === 'password' ? 'text' : 'password';
  passwordInput.type = type;
  this.textContent = type === 'password' ? '👁️' : '🙈';
});

document.getElementById('toggle-confirm-password').addEventListener('click', function() {
  const confirmPasswordInput = document.getElementById('confirm-password');
  const type = confirmPasswordInput.type === 'password' ? 'text' : 'password';
  confirmPasswordInput.type = type;
  this.textContent = type === 'password' ? '👁️' : '🙈';
});

function calculatePasswordStrength(password) {
  let strength = 0;
  if (password.length >= 8) strength++;
  if (password.length >= 12) strength++;
  if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
  if (/\d/.test(password)) strength++;
  if (/[^a-zA-Z0-9]/.test(password)) strength++;
  return strength;
}

// Registration Form Handler
document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const errorAlert = document.getElementById('error-alert');
  const errorMessage = document.getElementById('error-message');
  const successAlert = document.getElementById('success-alert');
  
  // Hide alerts
  errorAlert.style.display = 'none';
  successAlert.style.display = 'none';
  
  // Get form data
  const firstName = document.getElementById('first-name').value.trim();
  const lastName = document.getElementById('last-name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  const terms = document.getElementById('terms').checked;
  
  // Validation
  if (!firstName || !lastName || !email || !phone || !password || !confirmPassword) {
    errorMessage.textContent = 'Please fill in all fields';
    errorAlert.style.display = 'block';
    return;
  }
  
  if (password !== confirmPassword) {
    errorMessage.textContent = 'Passwords do not match';
    errorAlert.style.display = 'block';
    return;
  }
  
  if (password.length < 8) {
    errorMessage.textContent = 'Password must be at least 8 characters';
    errorAlert.style.display = 'block';
    return;
  }
  
  if (!terms) {
    errorMessage.textContent = 'Please accept the terms and conditions';
    errorAlert.style.display = 'block';
    return;
  }
  
  // Disable submit button
  const submitBtn = e.target.querySelector('button[type="submit"]');
  const originalText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating account...';
  
  try {
    // Combine first and last name
    const fullName = `${firstName} ${lastName}`.trim();
    
    // Call registration API
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: fullName,
        email,
        password
      })
    });
    
    const data = await response.json();
    
    if (!response.ok) {
      throw new Error(data.error || data.message || 'Registration failed');
    }
    
    // Show success and redirect to login
    window.location.href = 'login.html?registered=true';
    
  } catch (error) {
    console.error('Registration error:', error);
    errorMessage.textContent = error.message || 'Registration failed. Please try again.';
    errorAlert.style.display = 'block';
    submitBtn.disabled = false;
    submitBtn.textContent = originalText;
  }
});
</script>

</body>
</html>
