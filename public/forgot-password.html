<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Comfort Counsel</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      padding: 2rem 1.5rem;
    }
    
    .auth-card {
      background: white;
      border-radius: 1.5rem;
      padding: 3rem;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow-xl);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .auth-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    
    .auth-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    
    .auth-subtitle {
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    
    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      transition: var(--transition);
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    
    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .btn-submit:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }
    
    .btn-submit:disabled {
      background: var(--gray-300);
      cursor: not-allowed;
      transform: none;
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    
    .auth-link {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }
    
    .auth-link:hover {
      text-decoration: underline;
    }
    
    .alert {
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    
    .alert.show {
      display: block;
    }
    
    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid var(--success);
    }
    
    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    
    .success-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    
    @media (max-width: 480px) {
      .auth-card {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔑</div>
      <h1 class="auth-title">Forgot Password?</h1>
      <p class="auth-subtitle">No worries! Enter your email address and we'll send you a link to reset your password.</p>
    </div>
    
    <!-- Alert Messages -->
    <div class="alert alert-success" id="success-alert">
      <div class="success-icon">✅</div>
      <strong>Email Sent!</strong><br>
      Check your inbox for password reset instructions.
    </div>
    
    <div class="alert alert-error" id="error-alert"></div>
    
    <!-- Forgot Password Form -->
    <form id="forgot-password-form">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input 
          type="email" 
          class="form-input" 
          id="email" 
          placeholder="Enter your email address"
          required
        />
      </div>
      
      <button type="submit" class="btn-submit" id="submit-btn">
        Send Reset Link
      </button>
    </form>
    
    <div class="auth-footer">
      <p>Remember your password? <a href="login.html" class="auth-link">Back to Login</a></p>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  const form = document.getElementById('forgot-password-form');
  const emailInput = document.getElementById('email');
  const submitBtn = document.getElementById('submit-btn');
  const successAlert = document.getElementById('success-alert');
  const errorAlert = document.getElementById('error-alert');
  
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = emailInput.value.trim();
    
    if (!email) {
      showError('Please enter your email address');
      return;
    }
    
    // Disable button and show loading
    submitBtn.disabled = true;
    submitBtn.textContent = 'Sending...';
    
    // Hide alerts
    successAlert.classList.remove('show');
    errorAlert.classList.remove('show');
    
    try {
      // TODO: Call API to send reset email
      const response = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email })
      });
      
      const data = await response.json();
      
      if (response.ok) {
        // Show success message
        successAlert.classList.add('show');
        form.style.display = 'none';
        
        // Redirect to login after 5 seconds
        setTimeout(() => {
          window.location.href = 'login.html?reset=sent';
        }, 5000);
      } else {
        showError(data.error || 'Failed to send reset email. Please try again.');
      }
    } catch (error) {
      console.error('Error:', error);
      showError('An error occurred. Please try again later.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send Reset Link';
    }
  });
  
  function showError(message) {
    errorAlert.textContent = message;
    errorAlert.classList.add('show');
  }
</script>

</body>
</html>
