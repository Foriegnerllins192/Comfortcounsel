<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Comfort Counsel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <div class="nav-logo">🌿 Comfort Counsel</div>
  <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links" id="nav-links">
    <a href="index.html">Home</a>
    <a href="find-counselor.html">Find Counselor</a>
    <a href="register-counselor.html">Become a Counselor</a>
  </div>
</nav>

<div class="form-page">
  <div class="form-card">
    <h2>Reset Your Password</h2>
    <p class="form-sub">Enter your new password below</p>
    <div id="reset-alert"></div>
    <form id="reset-form">
      <div class="form-group">
        <label for="new-password">New Password</label>
        <div style="position:relative;display:flex;align-items:center;">
          <input type="password" id="new-password" placeholder="Min. 6 characters" required minlength="6" style="flex:1;padding-right:2.5rem;" />
          <button type="button" id="toggle-password" style="position:absolute;right:0.75rem;background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--muted);padding:0.5rem;" title="Show/hide password">👁️</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Reset Password</button>
    </form>
    <div class="form-footer">
      <a href="login.html">Back to login</a>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Mobile nav toggle
  const navToggle = document.getElementById('nav-toggle');
  const navLinks = document.getElementById('nav-links');
  if (navToggle) navToggle.addEventListener('click', () => navLinks.classList.toggle('open'));

  // Password visibility toggle
  const togglePasswordBtn = document.getElementById('toggle-password');
  const passwordInput = document.getElementById('new-password');
  if (togglePasswordBtn) {
    togglePasswordBtn.addEventListener('click', e => {
      e.preventDefault();
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePasswordBtn.textContent = isPassword ? '🙈' : '👁️';
    });
  }

  // Extract token from URL
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  console.log('[RESET PAGE] Token from URL:', token ? token.substring(0, 10) + '...' : 'NOT FOUND');

  if (!token) {
    document.getElementById('reset-alert').innerHTML = `<div class="alert alert-error">Invalid reset link. Please request a new password reset.</div>`;
    document.getElementById('reset-form').style.display = 'none';
  }

  // Handle form submission
  document.getElementById('reset-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    const alertEl = document.getElementById('reset-alert');
    const newPassword = document.getElementById('new-password').value;

    btn.disabled = true;
    btn.textContent = 'Resetting...';
    alertEl.innerHTML = '';

    try {
      if (!newPassword || newPassword.length < 6) {
        throw new Error('Password must be at least 6 characters');
      }

      console.log('[RESET PASSWORD] Sending request with token:', token.substring(0, 10) + '...');
      console.log('[RESET PASSWORD] Password length:', newPassword.length);

      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token,
          newPassword
        })
      });

      const data = await res.json();
      console.log('[RESET PASSWORD] Response:', { status: res.status, data });

      if (!res.ok) {
        throw new Error(data.error || `Request failed with status ${res.status}`);
      }

      alertEl.innerHTML = `<div class="alert alert-success">${data.message}</div>`;
      document.getElementById('reset-form').style.display = 'none';
      
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
    } catch (err) {
      console.error('[RESET PASSWORD ERROR]', err);
      alertEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'Reset Password';
    }
  });
});
</script>
</body>
</html>
