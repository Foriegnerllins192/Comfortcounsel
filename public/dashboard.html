<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Comfort Counsel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="dashboard">
  <aside class="sidebar">
    <div class="sidebar-logo">🌿 Comfort Counsel</div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Populated by JS based on role -->
    </nav>
    <div style="margin-top:auto;padding-top:2rem;">
      <button class="btn btn-outline" style="width:100%;color:white;border-color:rgba(255,255,255,.4)" onclick="logout()">Logout</button>
    </div>
  </aside>

  <main class="main-content" id="main-content">
    <p style="color:var(--muted)">Loading dashboard...</p>
  </main>
</div>

<script>
const token = localStorage.getItem('cc_token');
const user = JSON.parse(localStorage.getItem('cc_user') || 'null');

if (!token || !user) { window.location.href = 'login.html'; }

function logout() {
  localStorage.removeItem('cc_token');
  localStorage.removeItem('cc_user');
  window.location.href = 'index.html';
}

function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
}

// Build sidebar based on role
const nav = document.getElementById('sidebar-nav');
const role = user?.role;

if (role === 'admin') {
  nav.innerHTML = `
    <a href="#" class="active" onclick="showSection('overview')">Overview</a>
    <a href="#" onclick="showSection('pending-counselors')">Pending Counselors</a>
    <a href="#" onclick="showSection('all-users')">All Users</a>
    <a href="#" onclick="showSection('all-sessions')">Sessions</a>
    <a href="#" onclick="showSection('payments')">Payments</a>
  `;
  showSection('overview');
} else if (role === 'counselor') {
  nav.innerHTML = `
    <a href="#" class="active" onclick="showSection('c-overview')">Overview</a>
    <a href="#" onclick="showSection('c-sessions')">My Sessions</a>
    <a href="#" onclick="showSection('c-profile')">Edit Profile</a>
  `;
  showSection('c-overview');
} else {
  nav.innerHTML = `
    <a href="#" class="active" onclick="showSection('u-sessions')">My Sessions</a>
    <a href="#" onclick="window.location.href='find-counselor.html'">Book a Session</a>
  `;
  showSection('u-sessions');
}

async function showSection(section) {
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  const main = document.getElementById('main-content');

  if (section === 'overview') {
    const [users, sessions, payments] = await Promise.all([
      fetch('/api/admin/users', { headers: authHeaders() }).then(r => r.json()),
      fetch('/api/admin/sessions', { headers: authHeaders() }).then(r => r.json()),
      fetch('/api/admin/payments', { headers: authHeaders() }).then(r => r.json())
    ]);
    const totalRevenue = payments.filter(p => p.status === 'success').reduce((s, p) => s + parseFloat(p.amount), 0);
    main.innerHTML = `
      <h2 style="margin-bottom:1.5rem">Admin Overview</h2>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${users.length}</div><div class="stat-label">Total Users</div></div>
        <div class="stat-card"><div class="stat-value">${sessions.length}</div><div class="stat-label">Total Sessions</div></div>
        <div class="stat-card"><div class="stat-value">GHS ${totalRevenue.toFixed(2)}</div><div class="stat-label">Total Revenue</div></div>
        <div class="stat-card"><div class="stat-value">${payments.filter(p=>p.status==='success').length}</div><div class="stat-label">Successful Payments</div></div>
      </div>
    `;
  }

  else if (section === 'pending-counselors') {
    const data = await fetch('/api/admin/counselors/pending', { headers: authHeaders() }).then(r => r.json());
    main.innerHTML = `
      <h2 style="margin-bottom:1.5rem">Pending Counselor Applications</h2>
      <div class="table-card">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Category</th><th>Phone</th><th>Experience</th><th>Action</th></tr></thead>
          <tbody>${data.map(c => `
            <tr>
              <td>${c.name}</td><td>${c.email}</td><td>${c.category}</td>
              <td>${c.phone_number}</td><td>${c.years_experience} yrs</td>
              <td>
                <button class="btn btn-sm btn-primary" onclick="reviewCounselor(${c.id},'approve')">Approve</button>
                <button class="btn btn-sm" style="background:#fee2e2;color:#991b1b;margin-left:.5rem" onclick="reviewCounselor(${c.id},'reject')">Reject</button>
              </td>
            </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted)">No pending applications</td></tr>'}
          </tbody>
        </table>
      </div>`;
  }

  else if (section === 'all-users') {
    const data = await fetch('/api/admin/users', { headers: authHeaders() }).then(r => r.json());
    main.innerHTML = `
      <h2 style="margin-bottom:1.5rem">All Users</h2>
      <div class="table-card">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
          <tbody>${data.map(u => `
            <tr><td>${u.name}</td><td>${u.email}</td>
            <td><span class="badge badge-${u.role === 'admin' ? 'approved' : 'pending'}">${u.role}</span></td>
            <td>${new Date(u.created_at).toLocaleDateString()}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  else if (section === 'all-sessions') {
    const data = await fetch('/api/admin/sessions', { headers: authHeaders() }).then(r => r.json());
    main.innerHTML = `
      <h2 style="margin-bottom:1.5rem">All Sessions</h2>
      <div class="table-card">
        <table>
          <thead><tr><th>User</th><th>Counselor</th><th>Category</th><th>Payment</th><th>Status</th><th>Date</th></tr></thead>
          <tbody>${data.map(s => `
            <tr><td>${s.user_name}</td><td>${s.counselor_name}</td><td>${s.category}</td>
            <td><span class="badge badge-${s.payment_status === 'paid' ? 'paid' : 'pending'}">${s.payment_status}</span></td>
            <td><span class="badge badge-${s.session_status === 'completed' ? 'approved' : 'pending'}">${s.session_status}</span></td>
            <td>${new Date(s.created_at).toLocaleDateString()}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  else if (section === 'payments') {
    const data = await fetch('/api/admin/payments', { headers: authHeaders() }).then(r => r.json());
    main.innerHTML = `
      <h2 style="margin-bottom:1.5rem">Payments</h2>
      <div class="table-card">
        <table>
          <thead><tr><th>User</th><th>Email</th><th>Amount</th><th>Reference</th><th>Status</th><th>Date</th></tr></thead>
          <tbody>${data.map(p => `
            <tr><td>${p.user_name}</td><td>${p.email}</td><td>GHS ${p.amount}</td>
            <td style="font-size:.8rem">${p.paystack_reference || '-'}</td>
            <td><span class="badge badge-${p.status === 'success' ? 'paid' : 'pending'}">${p.status}</span></td>
            <td>${new Date(p.created_at).toLocaleDateString()}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  else if (section === 'c-overview') {
    const data = await fetch('/api/counselors/dashboard/me', { headers: authHeaders() }).then(r => r.json());
    main.innerHTML = `
      <h2 style="margin-bottom:1.5rem">Welcome, ${data.profile.name}</h2>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-value">${data.total_sessions}</div><div class="stat-label">Total Sessions</div></div>
        <div class="stat-card"><div class="stat-value">GHS ${parseFloat(data.earnings).toFixed(2)}</div><div class="stat-label">Total Earnings</div></div>
        <div class="stat-card"><div class="stat-value">${data.sessions.filter(s=>s.payment_status==='paid').length}</div><div class="stat-label">Paid Sessions</div></div>
      </div>
      <div class="table-card" style="margin-top:1.5rem">
        <h3>Recent Sessions</h3>
        <table>
          <thead><tr><th>Client</th><th>Payment</th><th>Status</th><th>Date</th></tr></thead>
          <tbody>${data.sessions.slice(0,10).map(s => `
            <tr><td>${s.user_name}</td>
            <td><span class="badge badge-${s.payment_status==='paid'?'paid':'pending'}">${s.payment_status}</span></td>
            <td><span class="badge badge-${s.session_status==='completed'?'approved':'pending'}">${s.session_status}</span></td>
            <td>${new Date(s.created_at).toLocaleDateString()}</td></tr>`).join('') || '<tr><td colspan="4" style="text-align:center;color:var(--muted)">No sessions yet</td></tr>'}
          </tbody>
        </table>
      </div>`;
  }

  else if (section === 'c-profile') {
    const data = await fetch('/api/counselors/dashboard/me', { headers: authHeaders() }).then(r => r.json());
    const p = data.profile;
    main.innerHTML = `
      <h2 style="margin-bottom:1.5rem">Edit Profile</h2>
      <div class="form-card" style="max-width:500px;box-shadow:none;padding:0">
        <div id="profile-alert"></div>
        <div class="form-group"><label>Bio</label><textarea id="edit-bio">${p.bio || ''}</textarea></div>
        <div class="form-group"><label>Location</label><input type="text" id="edit-location" value="${p.location || ''}" /></div>
        <div class="form-group"><label>Years of Experience</label><input type="number" id="edit-years" value="${p.years_experience || 0}" /></div>
        <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
      </div>`;
  }

  else if (section === 'u-sessions') {
    const data = await fetch('/api/my-sessions', { headers: authHeaders() }).then(r => r.json());
    main.innerHTML = `
      <h2 style="margin-bottom:1.5rem">My Sessions</h2>
      <div style="margin-bottom:1.5rem"><a href="find-counselor.html" class="btn btn-primary">+ Book New Session</a></div>
      <div class="table-card">
        <table>
          <thead><tr><th>Counselor</th><th>Category</th><th>Payment</th><th>Status</th><th>Date</th></tr></thead>
          <tbody>${data.map(s => `
            <tr><td>${s.counselor_name}</td><td>${s.category}</td>
            <td><span class="badge badge-${s.payment_status==='paid'?'paid':'pending'}">${s.payment_status}</span></td>
            <td><span class="badge badge-${s.session_status==='completed'?'approved':'pending'}">${s.session_status}</span></td>
            <td>${new Date(s.created_at).toLocaleDateString()}</td></tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--muted)">No sessions yet. <a href="find-counselor.html">Book one now</a></td></tr>'}
          </tbody>
        </table>
      </div>`;
  }
}

async function reviewCounselor(id, action) {
  await fetch(`/api/admin/counselors/${id}`, {
    method: 'PATCH',
    headers: authHeaders(),
    body: JSON.stringify({ action })
  });
  showSection('pending-counselors');
}

async function saveProfile() {
  const btn = document.querySelector('#main-content .btn-primary');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const res = await fetch('/api/counselors/profile/me', {
      method: 'PUT',
      headers: authHeaders(),
      body: JSON.stringify({
        bio: document.getElementById('edit-bio').value,
        location: document.getElementById('edit-location').value,
        years_experience: parseInt(document.getElementById('edit-years').value) || 0
      })
    });
    const data = await res.json();
    document.getElementById('profile-alert').innerHTML = `<div class="alert alert-success">${data.message}</div>`;
  } catch {
    document.getElementById('profile-alert').innerHTML = `<div class="alert alert-error">Failed to save.</div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Save Changes';
  }
}
</script>
</body>
</html>
