<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Comfort Counsel</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      padding: 2rem 1.5rem;
    }
    
    .auth-card {
      background: white;
      border-radius: 1.5rem;
      padding: 3rem;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow-xl);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .auth-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    
    .auth-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    
    .auth-subtitle {
      color: var(--text-secondary);
      line-height: 1.6;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }
    
    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid var(--border);
      border-radius: 0.5rem;
      font-size: 1rem;
      transition: var(--transition);
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }
    
    .password-strength {
      margin-top: 0.5rem;
      height: 4px;
      background: var(--gray-200);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .password-strength-bar {
      height: 100%;
      width: 0%;
      transition: all 0.3s ease;
      border-radius: 2px;
    }
    
    .strength-weak {
      width: 33%;
      background: var(--danger);
    }
    
    .strength-medium {
      width: 66%;
      background: var(--warning);
    }
    
    .strength-strong {
      width: 100%;
      background: var(--success);
    }
    
    .password-requirements {
      margin-top: 0.75rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    .requirement {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.25rem;
    }
    
    .requirement.met {
      color: var(--success);
    }
    
    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
    }
    
    .btn-submit:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }
    
    .btn-submit:disabled {
      background: var(--gray-300);
      cursor: not-allowed;
      transform: none;
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    
    .auth-link {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }
    
    .auth-link:hover {
      text-decoration: underline;
    }
    
    .alert {
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
      display: none;
    }
    
    .alert.show {
      display: block;
    }
    
    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
      border: 1px solid var(--success);
    }
    
    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    
    @media (max-width: 480px) {
      .auth-card {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter your new password below</p>
    </div>
    
    <!-- Alert Messages -->
    <div class="alert alert-success" id="success-alert">
      <strong>Success!</strong><br>
      Your password has been reset. Redirecting to login...
    </div>
    
    <div class="alert alert-error" id="error-alert"></div>
    
    <!-- Reset Password Form -->
    <form id="reset-password-form">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input 
          type="password" 
          class="form-input" 
          id="password" 
          placeholder="Enter new password"
          required
        />
        <div class="password-strength">
          <div class="password-strength-bar" id="strength-bar"></div>
        </div>
        <div class="password-requirements">
          <div class="requirement" id="req-length">
            <span>○</span> At least 8 characters
          </div>
          <div class="requirement" id="req-uppercase">
            <span>○</span> One uppercase letter
          </div>
          <div class="requirement" id="req-lowercase">
            <span>○</span> One lowercase letter
          </div>
          <div class="requirement" id="req-number">
            <span>○</span> One number
          </div>
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input 
          type="password" 
          class="form-input" 
          id="confirm-password" 
          placeholder="Confirm new password"
          required
        />
      </div>
      
      <button type="submit" class="btn-submit" id="submit-btn">
        Reset Password
      </button>
    </form>
    
    <div class="auth-footer">
      <p>Remember your password? <a href="login.html" class="auth-link">Back to Login</a></p>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script>
  const form = document.getElementById('reset-password-form');
  const passwordInput = document.getElementById('password');
  const confirmPasswordInput = document.getElementById('confirm-password');
  const submitBtn = document.getElementById('submit-btn');
  const successAlert = document.getElementById('success-alert');
  const errorAlert = document.getElementById('error-alert');
  const strengthBar = document.getElementById('strength-bar');
  
  // Get token from URL
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  
  if (!token) {
    showError('Invalid or missing reset token. Please request a new password reset link.');
    form.style.display = 'none';
  }
  
  // Password strength checker
  passwordInput.addEventListener('input', () => {
    const password = passwordInput.value;
    const strength = calculatePasswordStrength(password);
    
    // Update strength bar
    strengthBar.className = 'password-strength-bar';
    if (strength >= 4) {
      strengthBar.classList.add('strength-strong');
    } else if (strength >= 2) {
      strengthBar.classList.add('strength-medium');
    } else if (strength >= 1) {
      strengthBar.classList.add('strength-weak');
    }
    
    // Update requirements
    updateRequirement('req-length', password.length >= 8);
    updateRequirement('req-uppercase', /[A-Z]/.test(password));
    updateRequirement('req-lowercase', /[a-z]/.test(password));
    updateRequirement('req-number', /[0-9]/.test(password));
  });
  
  function calculatePasswordStrength(password) {
    let strength = 0;
    if (password.length >= 8) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[a-z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;
    return strength;
  }
  
  function updateRequirement(id, met) {
    const element = document.getElementById(id);
    if (met) {
      element.classList.add('met');
      element.querySelector('span').textContent = '✓';
    } else {
      element.classList.remove('met');
      element.querySelector('span').textContent = '○';
    }
  }
  
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const password = passwordInput.value;
    const confirmPassword = confirmPasswordInput.value;
    
    // Validate password
    if (password.length < 8) {
      showError('Password must be at least 8 characters long');
      return;
    }
    
    if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/[0-9]/.test(password)) {
      showError('Password must contain uppercase, lowercase, and numbers');
      return;
    }
    
    if (password !== confirmPassword) {
      showError('Passwords do not match');
      return;
    }
    
    // Disable button and show loading
    submitBtn.disabled = true;
    submitBtn.textContent = 'Resetting...';
    
    // Hide alerts
    successAlert.classList.remove('show');
    errorAlert.classList.remove('show');
    
    try {
      // TODO: Call API to reset password
      const response = await fetch('/api/reset-password', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ token, password })
      });
      
      const data = await response.json();
      
      if (response.ok) {
        // Show success message
        successAlert.classList.add('show');
        form.style.display = 'none';
        
        // Redirect to login after 3 seconds
        setTimeout(() => {
          window.location.href = 'login.html?reset=success';
        }, 3000);
      } else {
        showError(data.error || 'Failed to reset password. Please try again.');
      }
    } catch (error) {
      console.error('Error:', error);
      showError('An error occurred. Please try again later.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Reset Password';
    }
  });
  
  function showError(message) {
    errorAlert.textContent = message;
    errorAlert.classList.add('show');
  }
</script>

</body>
</html>
